version: '3.8'

services:
  app:
    build:
      context: .
      target: production
    container_name: auditor-libre
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      # Persist data
      - auditor-data:/data
      # Persist logs
      - auditor-logs:/app/logs
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-86400000}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/readyz', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - auditor-network

volumes:
  auditor-data:
    driver: local
  auditor-logs:
    driver: local

networks:
  auditor-network:
    driver: bridge
