<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditor Libre - Comparar inspecciones</title>
  <script>
    if (location.protocol === 'file:') {
      window.location.replace('http://127.0.0.1:3001/');
    }
  </script>
  <link rel="stylesheet" href="/style.css">
  <script defer src="/colorized-selects.js"></script>
</head>
<body>
<nav class="topnav">
  <a href="/" class="topnav-logo cursor-pointer">Auditor <span>Libre</span></a>
  <div class="topnav-sep"></div>
  <span class="nav-subtitle">Comparar inspecciones</span>
</nav>
<main class="index-main">
  <section class="secondary-hero secondary-hero-compare">
    <div>
      <div class="secondary-hero-kicker">Análisis cruzado</div>
      <h1 class="secondary-hero-title">Comparar inspecciones</h1>
      <p class="secondary-hero-copy">Elegí dos ejecuciones y detectá diferencias de respuesta, evolución de puntaje y cambios entre auditorías.</p>
    </div>
  </section>

  <div class="filter-bar filter-bar-elevated">
    <select class="input" id="selA"><option value="">Inspección A...</option></select>
    <select class="input" id="selB"><option value="">Inspección B...</option></select>
    <button class="btn btn-primary" id="btnCompare">Comparar</button>
  </div>

  <div id="compareResult"></div>
</main>
<div class="toast-container" id="toastContainer"></div>
<script src="/app.js"></script>
<script>
async function loadInspections() {
  var ins = await api.get('/api/inspections');
  var a = document.getElementById('selA');
  var b = document.getElementById('selB');
  ins.forEach(function(i) {
    var label = i.templateName + ' - ' + formatDate(i.startedAt);
    var opt1 = document.createElement('option');
    opt1.value = i.id;
    opt1.textContent = label;
    a.appendChild(opt1);
    var opt2 = document.createElement('option');
    opt2.value = i.id;
    opt2.textContent = label;
    b.appendChild(opt2);
  });
}

function renderCompareHeader(result) {
  return '<div class="compare-summary">' +
    '<div class="compare-summary-card">' +
      '<span class="compare-summary-kicker">Inspección A</span>' +
      '<strong>' + esc(result.a.name) + '</strong>' +
      '<span>' + formatDate(result.a.date) + (result.a.maxScore > 0 ? ' | ' + result.a.score + '/' + result.a.maxScore : '') + '</span>' +
    '</div>' +
    '<div class="compare-summary-card">' +
      '<span class="compare-summary-kicker">Inspección B</span>' +
      '<strong>' + esc(result.b.name) + '</strong>' +
      '<span>' + formatDate(result.b.date) + (result.b.maxScore > 0 ? ' | ' + result.b.score + '/' + result.b.maxScore : '') + '</span>' +
    '</div>' +
  '</div>';
}

function renderCompareRows(questions) {
  return questions.map(function(q) {
    return '<tr class="' + (q.diff ? 'compare-row-diff' : '') + '">' +
      '<td>' + esc(q.text) + '</td>' +
      '<td class="text-sm text-muted">' + esc(q.page) + '</td>' +
      '<td>' + esc(String(q.aValue || '-')) + '</td>' +
      '<td>' + esc(String(q.bValue || '-')) + '</td>' +
      '<td>' + (q.diff ? '<span class="compare-pill compare-pill-diff">Diferente</span>' : '<span class="compare-pill compare-pill-same">Igual</span>') + '</td>' +
    '</tr>';
  }).join('');
}

async function compare() {
  var aId = document.getElementById('selA').value;
  var bId = document.getElementById('selB').value;
  if (!aId || !bId) {
    toast('Seleccioná dos inspecciones', 'error');
    return;
  }
  try {
    var r = await api.get('/api/inspections/compare?a=' + aId + '&b=' + bId);
    var html = '<div class="card card-padding card-elevated compare-card">';
    html += renderCompareHeader(r);
    html += '<div class="compare-table-wrap">';
    html += '<table class="template-table"><thead><tr><th>Pregunta</th><th>Página</th><th>A</th><th>B</th><th>Diferencia</th></tr></thead><tbody>';
    html += renderCompareRows(r.questions);
    html += '</tbody></table></div></div>';
    document.getElementById('compareResult').innerHTML = html;
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

loadInspections();
document.getElementById('btnCompare').addEventListener('click', compare);
</script>
</body>
</html>
