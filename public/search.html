<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Búsqueda global - Auditor Libre</title>
  <script>
    if (location.protocol === 'file:') {
      window.location.replace('http://127.0.0.1:3001/');
    }
  </script>
  <link rel="stylesheet" href="/style.css">
  <script defer src="/colorized-selects.js"></script>
</head>
<body>
<nav class="topnav">
  <div class="topnav-logo"><a href="/" class="inherit-color no-underline">Auditor <span>Libre</span></a></div>
  <div class="topnav-sep"></div>
  <span class="nav-subtitle">Búsqueda</span>
</nav>

<main class="search-container">
  <section class="secondary-hero secondary-hero-search">
    <div>
      <div class="secondary-hero-kicker">Exploración global</div>
      <h1 class="secondary-hero-title">Buscá plantillas, inspecciones y respuestas</h1>
      <p class="secondary-hero-copy">Encontrá rápido lo que necesitás entre formularios, ejecuciones, notas y acciones sin navegar pantalla por pantalla.</p>
    </div>
  </section>

  <input type="text" id="searchInput" class="search-input" placeholder="Buscar plantillas, inspecciones, respuestas..." autofocus>

  <div class="search-filters" id="searchFilters">
    <button class="search-filter active" data-type="all">Todo</button>
    <button class="search-filter" data-type="templates">Plantillas</button>
    <button class="search-filter" data-type="inspections">Inspecciones</button>
  </div>

  <div id="searchResults" class="search-results"></div>
</main>

<script src="/app.js"></script>
<script>
let currentType = 'all';
let searchTimeout = null;

const typeLabels = {
  template: 'Plantilla',
  question: 'Pregunta',
  inspection: 'Inspección',
  answer: 'Respuesta',
  note: 'Nota',
  action: 'Acción'
};

document.getElementById('searchFilters').addEventListener('click', function(e) {
  if (e.target.classList.contains('search-filter')) {
    document.querySelectorAll('.search-filter').forEach(function(btn) { btn.classList.remove('active'); });
    e.target.classList.add('active');
    currentType = e.target.getAttribute('data-type');
    performSearch();
  }
});

document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(performSearch, 300);
});

async function performSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const resultsContainer = document.getElementById('searchResults');

  if (query.length < 2) {
    resultsContainer.innerHTML = '<div class="search-loading">Escribí al menos 2 caracteres para buscar...</div>';
    return;
  }

  resultsContainer.innerHTML = '<div class="search-loading">Buscando...</div>';

  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(query) + '&type=' + currentType);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      resultsContainer.innerHTML = '<div class="search-loading">No se encontraron resultados.</div>';
      return;
    }

    resultsContainer.innerHTML = '';
    data.results.forEach(function(result) {
      const a = document.createElement('a');
      a.href = result.url;
      a.className = 'search-result';
      const typeLabel = typeLabels[result.type] || result.type;
      a.innerHTML =
        '<div class="search-result-title">' +
          '<span class="search-result-type">' + esc(typeLabel) + '</span>' +
          esc(result.title) +
        '</div>' +
        '<div class="search-result-subtitle">' + esc(result.subtitle) + '</div>';
      resultsContainer.appendChild(a);
    });
  } catch (e) {
    resultsContainer.innerHTML = '<div class="search-loading">Error al buscar.</div>';
  }
}
</script>
</body>
</html>
